# Grafana dashboard provider — loads dashboards from disk automatically.
apiVersion: 1
providers:
  - name: Vulna
    orgId: 1
    folder: Vulna
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
