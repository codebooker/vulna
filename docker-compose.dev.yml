# Development stack for Vulna (VulnaDash).
#
# Usage:
#   cp .env.example .env
#   docker compose -f docker-compose.dev.yml up --build
#
# Brings up PostgreSQL, Redis, the FastAPI backend (with autoreload), and the
# Vite frontend dev server. Intended for local development only — not hardened
# for production. See docker-compose.yml for the production-oriented stack.

name: vulna-dev

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vulna}
      POSTGRES_USER: ${POSTGRES_USER:-vulna}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vulna_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vulna} -d ${POSTGRES_DB:-vulna}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./dash/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      VULNA_ENV: development
      VULNA_CORS_ORIGINS: http://localhost:5173
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      # Mount source for autoreload during development.
      - ./dash/backend/app:/app/app:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_TARGET: http://api:8000
    volumes:
      - ./dash/frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_dev_data:
  redis_dev_data:
  frontend_node_modules:
