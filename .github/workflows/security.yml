name: security

on:
  push:
    branches: [main]
  # No path filter on PRs so the check reports on every PR.
  pull_request:

permissions:
  contents: read

jobs:
  dependency-scan:
    name: dependency-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Backend dependency audit (pip-audit)
        working-directory: dash/backend
        run: |
          pip install --require-hashes -r requirements-dev.lock
          pip install --no-build-isolation --no-deps -e .
          pip-audit

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Frontend dependency audit (npm audit)
        working-directory: dash/frontend
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
      - name: Reject unsafe OpenPGP packages (GO-2026-5932)
        run: python3 deploy/security/check_go_openpgp.py
      - name: Probe vulnerability scan (govulncheck)
        working-directory: scout
        # A called dependency vulnerability must fail the build. Go stdlib
        # advisories are a toolchain concern — patched by upgrading Go — so they
        # are reported but do not fail CI when only a newer, not-yet-available Go
        # fixes them.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          "$(go env GOPATH)/bin/govulncheck" -format json ./... > govulncheck.json || true
          python3 ../deploy/security/check_govuln_findings.py \
            govulncheck.json --subject Scout

  hardening-tests:
    name: hardening-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Test govulncheck finding classification
        run: python3 deploy/security/test_check_govuln_findings.py
      - name: Backup/restore smoke test
        run: bash deploy/backup/smoke_test.sh
      - name: Release signing smoke test
        run: bash deploy/release/smoke_test.sh
      - name: Shellcheck hardening scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck deploy/backup/*.sh deploy/release/*.sh deploy/relay-egress/*.sh deploy/sbom/generate-sbom.sh

  relay-dataplane:
    name: relay-dataplane
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install WireGuard integration tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl iproute2 iptables iputils-ping jq tcpdump wireguard-tools
          sudo modprobe wireguard
      - name: Exercise Relay namespaces, routes, deny rules, and fail-closed behavior
        run: sudo sh deploy/relay-egress/integration_test.sh
