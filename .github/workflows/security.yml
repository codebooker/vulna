name: security

on:
  push:
    branches: [main]
  # No path filter on PRs so the check reports on every PR.
  pull_request:

permissions:
  contents: read

jobs:
  dependency-scan:
    name: dependency-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Backend dependency audit (pip-audit)
        working-directory: dash/backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip-audit

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Frontend dependency audit (npm audit)
        working-directory: dash/frontend
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Probe vulnerability scan (govulncheck)
        working-directory: scout
        # scout is standard-library-only (no third-party modules), so a called
        # *dependency* vulnerability must fail the build. Go stdlib advisories are
        # a toolchain concern — patched by upgrading Go — so they are reported but
        # do not fail CI when only a newer, not-yet-available Go fixes them.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" -format json ./... > govulncheck.json || true
          python3 - <<'PY'
          import json, sys
          # govulncheck -format json emits a stream of pretty-printed JSON objects.
          text = open("govulncheck.json").read()
          dec, i, n = json.JSONDecoder(), 0, len(text)
          dep, std = set(), set()
          while i < n:
              while i < n and text[i] in " \t\r\n":
                  i += 1
              if i >= n:
                  break
              obj, i = dec.raw_decode(text, i)
              f = obj.get("finding")
              if not f:
                  continue
              trace = f.get("trace") or []
              if not trace:      # imported but not called
                  continue
              module = trace[0].get("module", "")
              osv = f.get("osv", "")
              if module in ("stdlib", "toolchain"):
                  std.add(osv)
              else:
                  dep.add((osv, module))
          if dep:
              print("FAIL: called dependency vulnerabilities:", sorted(dep))
              sys.exit(1)
          if std:
              print("NOTE: Go stdlib advisories in the current toolchain "
                    "(patched by upgrading Go):", sorted(std))
          print("OK: no called dependency vulnerabilities (scout is stdlib-only).")
          PY

  hardening-tests:
    name: hardening-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Backup/restore smoke test
        run: bash deploy/backup/smoke_test.sh
      - name: Release signing smoke test
        run: bash deploy/release/smoke_test.sh
      - name: Shellcheck hardening scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck deploy/backup/*.sh deploy/release/*.sh deploy/sbom/generate-sbom.sh
