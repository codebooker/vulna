name: frontend

on:
  push:
    branches: [main]
    paths:
      - "dash/frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "dash/frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: dash/frontend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dash/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
