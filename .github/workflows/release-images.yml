name: release-images

# Build and publish the versioned api/frontend images that a deployment pulls.
# docker-compose.yml pins api/frontend to
#   ${VULNA_REGISTRY:-ghcr.io/codebooker}/vulna-{api,frontend}:${VULNA_VERSION}
# so `vulna update` (docker compose pull) fetches the exact release. Without this
# workflow those tags do not exist and an update cannot actually change versions.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. v1.0.0)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: dash/backend
          - name: frontend
            context: dash/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulna-${{ matrix.name }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/vulna-${{ matrix.name }}:latest
