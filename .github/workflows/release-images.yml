name: release-images

# Build and publish the versioned api/frontend images that a deployment pulls.
# docker-compose.yml pins api/frontend to
#   ${VULNA_REGISTRY:-ghcr.io/codebooker}/vulna-{api,frontend}:${VULNA_VERSION}
# so `vulna update` (docker compose pull) fetches the exact release. Without this
# workflow those tags do not exist and an update cannot actually change versions.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. v1.0.0)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: dash/backend
            dockerfile: dash/backend/Dockerfile
          - name: frontend
            context: dash/frontend
            dockerfile: dash/frontend/Dockerfile
          - name: local-scout
            context: .
            dockerfile: deploy/single-host/local-scout.Dockerfile
          - name: relay-egress
            context: .
            dockerfile: deploy/relay-egress/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          # Git tags are v-prefixed (v1.0.0) but the release manifest, the CLI's
          # buildinfo.Version, and VULNA_VERSION in the deployment .env are all bare
          # (1.0.0). Compose pins vulna-api:${VULNA_VERSION}, so the published image
          # tag MUST be bare too — strip a leading 'v' so pull finds it.
          raw="${{ github.event.inputs.version }}"
          [ -n "$raw" ] || raw="${GITHUB_REF_NAME}"
          echo "version=${raw#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulna-${{ matrix.name }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/vulna-${{ matrix.name }}:latest
