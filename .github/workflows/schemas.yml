name: schemas

on:
  push:
    branches: [main]
    paths:
      - "shared/**"
      - ".github/workflows/schemas.yml"
  # No path filter on PRs: required status check must report on every PR.
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install validators
        run: pip install jsonschema==4.26.0 pyyaml==6.0.3

      - name: Validate schemas and examples
        run: |
          python - <<'PY'
          import json, glob
          from jsonschema import Draft202012Validator
          import yaml

          schemas = {}
          for path in glob.glob("shared/schemas/*.schema.json"):
              with open(path) as f:
                  s = json.load(f)
              Draft202012Validator.check_schema(s)
              schemas[path] = s
              print("schema OK:", path)

          def validate(example, schema):
              with open(example) as f:
                  data = json.load(f) if example.endswith(".json") else yaml.safe_load(f)
              Draft202012Validator(schemas[schema]).validate(data)
              print("example OK:", example, "->", schema)

          validate("shared/examples/job.example.json", "shared/schemas/job.schema.json")
          validate("shared/examples/policy.example.json", "shared/schemas/policy.schema.json")
          validate("shared/schemas/nmap.plugin.example.yaml", "shared/schemas/plugin.schema.json")
          validate(
              "shared/examples/report-bundle.example.json",
              "shared/schemas/report-bundle.schema.json",
          )
          PY
