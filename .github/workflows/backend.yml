name: backend

on:
  push:
    branches: [main]
    paths:
      - "dash/backend/**"
      - ".github/workflows/backend.yml"
  # No path filter on PRs: this is a required status check, so it must report on
  # every pull request (a skipped workflow leaves a required check stuck pending).
  pull_request:

permissions:
  contents: read

defaults:
  run:
    working-directory: dash/backend

jobs:
  test:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (type check)
        run: mypy app

      - name: Alembic migrations match models
        env:
          VULNA_DATABASE_URL: sqlite+aiosqlite:///./ci_migration_check.db
        run: |
          alembic upgrade head
          alembic check

      - name: Pytest
        run: pytest
