name: backend

on:
  push:
    branches: [main]
    paths:
      - "dash/backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "dash/backend/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: dash/backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (type check)
        run: mypy app

      - name: Pytest
        run: pytest
