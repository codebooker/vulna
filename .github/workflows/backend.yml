name: backend

on:
  push:
    branches: [main]
    paths:
      - "dash/backend/**"
      - ".github/workflows/backend.yml"
  # No path filter on PRs: this is a required status check, so it must report on
  # every pull request (a skipped workflow leaves a required check stuck pending).
  pull_request:

permissions:
  contents: read

defaults:
  run:
    working-directory: dash/backend

jobs:
  test:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements-dev.lock
          pip install --no-build-isolation --no-deps -e .

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (type check)
        run: mypy app

      - name: Alembic migrations match models
        env:
          VULNA_DATABASE_URL: sqlite+aiosqlite:///./ci_migration_check.db
        run: |
          alembic upgrade head
          alembic check

      - name: Pytest
        run: pytest
