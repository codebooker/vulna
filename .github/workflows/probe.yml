name: probe

on:
  push:
    branches: [main]
    paths:
      - "scout/**"
      - ".github/workflows/probe.yml"
  # No path filter on PRs: required status check must report on every PR.
  pull_request:

permissions:
  contents: read

defaults:
  run:
    working-directory: scout

jobs:
  test:
    name: probe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          # No external dependencies yet, so there is no go.sum to cache on.
          cache: false

      - name: Formatting (gofmt)
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo 'Run gofmt -w .'; exit 1; }

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  cross-build:
    name: probe-cross-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          cache: false

      - name: Build Scout and Relay for linux/${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o bin/vulnascout-linux-${{ matrix.goarch }} ./cmd/vulnascout
          go build -o bin/vulnarelay-linux-${{ matrix.goarch }} ./cmd/vulnarelay
