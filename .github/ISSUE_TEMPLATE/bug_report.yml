name: Bug report
description: Report a problem with Vulna (do NOT use for security vulnerabilities)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Security issue?** Do not file it here. Follow the private process in
        [SECURITY.md](../blob/main/SECURITY.md) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - VulnaDash (backend/API)
        - VulnaDash (frontend)
        - VulnaScout (probe)
        - Docs / other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, Docker version, deployment mode.
