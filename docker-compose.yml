# Production-oriented Docker Compose stack for the Vulna orchestrator (VulnaDash).
#
# This is the Phase 0 skeleton. It builds the API and frontend locally; later
# phases publish images to GHCR and introduce the worker, scheduler, and report
# worker as assessment functionality lands. Optional MinIO and Metasploit
# services (disabled by default) are added in the phases that need them.
#
# Usage:
#   cp .env.example .env    # set POSTGRES_PASSWORD, VULNA_* secrets, VULNA_DOMAIN
#   docker compose up -d
#
# Modes:
#   - HTTP-only local lab: leave VULNA_DOMAIN blank and set CADDY_TLS=internal
#   - TLS production:       set VULNA_DOMAIN and a valid CADDY_TLS email

name: vulna

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      VULNA_DOMAIN: ${VULNA_DOMAIN:-}
      CADDY_TLS: ${CADDY_TLS:-internal}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy

  frontend:
    build:
      context: ./dash/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./dash/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      VULNA_ENV: production
    expose:
      - "8000"
    volumes:
      - reports:/var/lib/vulna/reports
      - evidence:/var/lib/vulna/evidence
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vulna}
      POSTGRES_USER: ${POSTGRES_USER:-vulna}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vulna} -d ${POSTGRES_DB:-vulna}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  reports:
  evidence:
  caddy_data:
  caddy_config:
