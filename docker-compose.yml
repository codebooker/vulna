# Production-oriented Docker Compose stack for the Vulna orchestrator (VulnaDash).
#
# The API, scheduler, and worker use one image. Optional monitoring and
# assessment services remain profile- or overlay-controlled.
#
# Usage:
#   cp .env.example .env    # set POSTGRES_PASSWORD, VULNA_* secrets, VULNA_DOMAIN
#   docker compose up -d
#
# Modes:
#   - HTTP-only local lab: leave VULNA_DOMAIN blank and set CADDY_TLS=internal
#   - TLS production:       set VULNA_DOMAIN and a valid CADDY_TLS email

name: vulna

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Caddy's `{$VULNA_DOMAIN:localhost}` default only applies when the var is
      # UNSET; Compose interpolation always sets it (to "" when blank), which
      # defeats that default and yields a keyless — invalid — Caddy site block.
      # So resolve the lab default here: blank VULNA_DOMAIN => localhost.
      VULNA_DOMAIN: ${VULNA_DOMAIN:-localhost}
      CADDY_TLS: ${CADDY_TLS:-internal}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy

  frontend:
    image: ${VULNA_REGISTRY:-ghcr.io/codebooker}/vulna-frontend:${VULNA_VERSION:-dev}
    build:
      context: ./dash/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    healthcheck:
      # 127.0.0.1, not localhost: busybox wget resolves localhost to ::1 first,
      # but nginx listens IPv4-only, so "localhost" never connects.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    # Versioned published image so `vulna update` (docker compose pull) actually
    # fetches the requested release. `build:` is a dev convenience for building
    # locally; a real deployment pulls the image for VULNA_VERSION.
    image: ${VULNA_REGISTRY:-ghcr.io/codebooker}/vulna-api:${VULNA_VERSION:-dev}
    build:
      context: ./dash/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      VULNA_ENV: production
    expose:
      - "8000"
    volumes:
      - keys:/var/lib/vulna/keys
      - reports:/var/lib/vulna/reports
      - evidence:/var/lib/vulna/evidence
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  scheduler:
    image: ${VULNA_REGISTRY:-ghcr.io/codebooker}/vulna-api:${VULNA_VERSION:-dev}
    build:
      context: ./dash/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      VULNA_ENV: production
      VULNA_RUN_MIGRATIONS: "false"
    command: ["vulna", "scheduler"]
    # The image's HTTP healthcheck belongs to the API command. Process health is
    # reported through durable scheduler heartbeats instead.
    healthcheck:
      disable: true
    depends_on:
      api:
        condition: service_healthy

  worker:
    image: ${VULNA_REGISTRY:-ghcr.io/codebooker}/vulna-api:${VULNA_VERSION:-dev}
    build:
      context: ./dash/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - path: .env
        required: false
    environment:
      VULNA_ENV: production
      VULNA_RUN_MIGRATIONS: "false"
    command: ["vulna", "worker"]
    healthcheck:
      disable: true
    volumes:
      # Scheduled scan jobs must use the same signing key as API-created jobs.
      - keys:/var/lib/vulna/keys
      - reports:/var/lib/vulna/reports
      - evidence:/var/lib/vulna/evidence
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vulna}
      POSTGRES_USER: ${POSTGRES_USER:-vulna}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vulna} -d ${POSTGRES_DB:-vulna}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- VulnaPulse observability (opt-in) -----------------------------------
  # Start with:  docker compose --profile monitoring up -d
  # Grafana on :3000 (admin / ${GRAFANA_PASSWORD:-admin}); Prometheus on :9090.
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-vulna}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-vulna}?sslmode=disable"
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      REDIS_ADDR: "redis://redis:6379"
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    expose:
      - "8080"

volumes:
  postgres_data:
  redis_data:
  keys:
  reports:
  evidence:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
